name: Comparison Benchmarks

on:
  schedule:
    - cron: '0 4 * * 1' # weekly, Monday 04:00 UTC
  workflow_dispatch:
    inputs:
      bench:
        description: 'Benchmark pattern'
        required: false
        default: '.'
      count:
        description: 'Number of iterations'
        required: false
        default: '5'

permissions:
  contents: read

jobs:
  comparison:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Run comparison benchmarks
        working-directory: comparison
        run: |
          BENCH="${{ inputs.bench || '.' }}"
          COUNT="${{ inputs.count || '5' }}"
          go test -run '^$' -bench "$BENCH" -benchmem -count "$COUNT" -timeout 60m \
            | tee "$GITHUB_WORKSPACE/comparison.txt"

      - name: Generate summary
        run: |
          {
            echo "## Comparison Benchmarks (jwx vs golang-jwt)"
            echo ""
            echo '```'
            cat comparison.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: comparison-results
          path: comparison.txt
